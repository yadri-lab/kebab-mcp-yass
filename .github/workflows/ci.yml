name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # SUPPLY-02 (SV6-4): fail CI on any high-severity vulnerability.
      # Currently 0 high vulns (3 moderate from langsmith via stagehand,
      # tracked separately). Moderate is non-blocking; high is fatal.
      - name: npm audit (high+)
        run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run format:check
      - name: Dead code check (knip)
        run: npm run lint:unused
        continue-on-error: true
      - run: npm run build
      - run: npm run test:coverage
      - name: Verify coverage thresholds
        run: echo "Coverage thresholds enforced by vitest config"
      - run: npm run test:registry
      - run: npm run test:contract
      # Integration test — starts a real Next.js server and hits health + MCP endpoints.
      # Requires the build step above to have completed (needs .next/ output).
      - name: Integration test
        run: npm run test:integration
        env:
          MCP_AUTH_TOKEN: test-token-ci
