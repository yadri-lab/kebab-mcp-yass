name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # CI-01 (v0.11 Phase 43): test on both the current LTS (20) and current
    # stable (22) so Node-22-only syntax or Node-20-only bugs are caught
    # pre-merge. `fail-fast: false` so a per-version failure still produces
    # the other job's log for triage.
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # SCM-03 (v0.11 Phase 44): audit gate policy. FAIL on direct-dep
      # moderate+ (unless allowlisted in scripts/audit-gate.mjs with
      # reason + reviewBy), FAIL on any high/critical, WARN on
      # transitive-dep moderate. Supersedes the earlier SUPPLY-02
      # `npm audit --audit-level=high` gate.
      - name: audit gate (scripted policy)
        run: node scripts/audit-gate.mjs
      - run: npm run lint
      - run: npm run format:check
      # CI-03 (v0.11 Phase 43): knip now blocks on new dead code. The
      # one-time cleanup in `chore(knip):` b1fb3d1 landed before this
      # flip so the main branch is green.
      - name: Dead code check (knip)
        run: npm run lint:unused
      - run: npm run build
      # PERF-05 (v0.11 Phase 43): bundle-size gate. Reads
      # `.next/diagnostics/route-bundle-stats.json` + `.size-limit.json`
      # and fails if any watched route exceeds its committed budget.
      # Runs immediately after build so regressions surface early.
      - name: Bundle size check (size-limit)
        run: npm run size:check
      # CI-02 (v0.11 Phase 43): coverage threshold is enforced by vitest
      # (see `vitest.config.ts` thresholds.lines = 46). The prior
      # "Verify coverage thresholds" echo step was a placeholder; removed
      # now that the real threshold is enforced. Threshold is set to
      # `floor(actual coverage)` as a ratchet — v0.12 target is 80%.
      - run: npm run test:coverage
      - run: npm run test:registry
      - run: npm run test:contract
      # Integration test — starts a real Next.js server and hits health + MCP endpoints.
      # Requires the build step above to have completed (needs .next/ output).
      - name: Integration test
        run: npm run test:integration
        env:
          MCP_AUTH_TOKEN: test-token-ci
